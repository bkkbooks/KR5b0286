body:
  text: 若是丁未丁巳隨日旺冝應之各召而使之兩兩下在人間要知吉凶召而問之即說也祭醮法凡欲祭醮先用不觸淨席一領新布巾一條鹿脯六分栗子棗子六分新美酒酥蜜六合香一爐燭六枝先灑掃地一室鋪置訖少坐細說勿使人聞思神良久方可祝之曰六丁玉女與我師按行天下舉事必勝洞曉往來邪氣不侵辟除不祥與子為友我常祀汝飲酒食果脯隨其所願不得有違學道求仙隨心所請燒丹鍊藥必得遂成願降神仙與道合真急急如太上律令祭醮六丁符法用淨席一領手巾一條六尺鹿脯酒果煎餅各六分香一爐灑掃一室鋪排訖從甲子日齊戒三日於淨室燒香䖍心禱祝發願至六丁日亥時向旺方書六丁神像并符皆布於席上焚香稽首向東方叩齒三十六通呪曰天之所育地之所生上受神符可以長生仙人輔己玉女佐形二十八宿記列星名五方五色黑白赤青中央黃帝與我俱并受符之後所願如意破滅群精自知不真勿當吾真自知不神不當吾神前去封侯後出斬首急急如律令凡作符先齊三日七日亦可書符時面向旺方端坐淨思神容如對念呪曰謹請六丁仙吏丁卯神足日之丁酉神元天上丁亥神大明集丁酉神救欽靈丁未神乘紫雲丁巳神朱乘稱經曰行此法皆須志心䖍誠更莫起他念便將符依次第吞之其人心歡然如有所曉至明朝還作符吞得七日後即於淨室中結壇端坐具香華燈燭各一分書本位符及神名安於席上東向叩齒三十六通想五色雲氣之間乃見其神各於六門而入坐其座上不得熟視但心念祈告所願之意其念必應昔蚩尢作亂黃帝與蚩尤頻戰不尅帝曰吾聞伏羲在位無兵治天下廓清乾坤康泰天下安寧今蚩尤一庶人也伐而無徵攻之不克吾之過也告敬未息目前忽覩五色雲自空中而來雲中有二童子持金函後有六仙女同於雲中奉九天玄女聖命與帝送造化之源天地之禍福八卦之衰旺風雲之變動氣候之成敗日月之勝負隂陽之得失星辰之臧否人情之逆順變化之理法帝乃長跪而受童子浮雲而去六仙士已不見帝遂受得函未敢便看急灑掃一室治齊三日方始開函受得六丁訣一部上卷說供養醮祭之法中卷說長生不死之道下卷說强兵戰勝遁甲六壬玄女尸解之法帝乃依文告敬修之不旬日似覺身異舉步飛行再約蚩尤交戰一鼓而滅却蚩尤於涿鹿之源豈不是得元氣精而除却妖氛也後感天下廓清乾坤得位隂陽不失其序帝遂修長生不死之術自製隂符經一卷藏隱機要後帝乃白日升天其隂符云八卦甲子神機鬼藏便是六丁遁甲强兵戰勝之術是九天玄女術也六丁隱遁法局六丁者天地之正神也不同尋常青龍明堂太隂其神常隨玉女受使在天地之內如欲隱身令人乃一切物不見己者青龍日行到玉女即人不見也夫欲隱身左手持刀閉口右手畫四方圖子若惡人在外於門內局子六步惡人在門中便於庭作局子六步如惡人在中庭於室內作局子六尺若在田野作局子六丈用算子長一尺二寸逐青龍上依次而行直放算子到天門上用右手橫算子一條閉天門而去閉天門了身已隱也每一算子存為一人玉女到太隂住存想外人已不見也術曰居青龍歷蓬星過明堂住太隂出天門入地戶藏華蓋隱玉女急急如太上律令丁卯隱人身丁巳隱人命丁亥隱人祿丁酉隱人魂丁未隱人魄丁丑隱人精神凡事於六丁日念呪六遍呪曰仁髙護我丁丑保我仁和度我丁酉保全仁燦管魂丁巳養神太隂華蓋地戶天門吾行禹步玄女真人明堂坐卧隱伏藏身急急如九天玄女律令如每供飬之物並自喫不得與外人切冝愼之每遇甲子日須齊戒一日丁卯玉士名文伯字仁髙神戴冠著禮衣手把蓮華上朱衣下青衣以子丑日下在人間要知吉凶召而問之丁丑玉女名文公字仁貴其神兩手把蓮華上朱衣下黃衣以寅卯日下人間要知吉凶召而問之丁亥玉女名文通字仁和右手把鏡自照掩心左手把蓮華上朱衣下紫衣以辰巳日下人間要知吉凶召而間之丁未玉女名叔通字仁粲左手把鏡照右手執蓮華上朱衣下黃衣以午未日下人間要知吉凶召而問之丁巳玉女名庭卿字仁叔神左手把蓮華右執白疊布巾上錦衣下赤衣以申酉日下人間要知吉凶召而問之丁酉玉女名文卿字仁通神領一小兒在仙手撫頭把白疊布巾上朱衣下白衣以戌亥日下人間要知吉凶召而問之黃帝曰六丁神各有名字不同若欲使之各呼名字皆神驗也仙經曰六丁玉女神名能小耳呼名字而使之萬願從矣隱遁十二時算子法歌曰鼠行失冗入狗市牛入兔園因猫止猛虎跳梁南到巳兔入牛欄伏不起龍入馬廄食甘草螣蛇宛轉來申裏馬入龍泉飲甘水羊雞鳥處入酉裹猿猴起健猪門內雞飛落泊羊欄裏狗來鼠入坎冗中猳猪東遊虎所牽每行出時須呪曰天反地覆天反地覆九道皆塞空有人來追我者從此而惑以東為西以南為北乘車來者折其軸騎馬來者掩其目步行來者腫其足揚兵來者當自伏不敢起明星北斗却敵萬里追我者亡覔我者止牽牛織女化成江海急急如律令呪訖便使左手下算閉禹步閉氣而去玉女呪玉女天神至矣永與我侍行到於某處杳杳冥冥莫覩其形人不聞其聲鬼不見其精善我者福惡我者殃鬼賊當我者死值我者亡千人萬人見我喜悅急急如律令呪訖即出便須閉門之法左手持刀畫地斷之閉氣而去局法室內六尺庭中六步門外六十步野外六百步或六里每臨出行當呼旬上玉女來護我無令百鬼傷我人莫見我見者為萊薪獨開我門而閉他戶都呪吾自是天目天相逐精若雷電明耀八極徹視表裏無物不伏急急如律令禹步罡無言法六丁無言萬一法亦云軒轅訣也先須焚香淨水滌穢氣方乃開卷禱祝看之昔有道士張群志慕道術積修數載慕其清虛間閲仙祕忽於丁丑夜二更以來於間庭月下立忽見西南方有雲五色而見漸近雲中有步隊之聲目忽有一女子云六丁玉女丁丑女也群乃長跪稽首禮之女曰子久慕仙道知子清潔少慕幽玄故來傳汝學道妙門奈汝無仙分但汝齊戒百日設錦帳於淨室內齎戒百日滿後再來示汝之法群乃清齊百日設錦帳於淨室內了夜三更時依前亦從南來隊仗雲中來至先見二童子捧一金函言奉修行術群遂受得金函言是六丁經三卷上卷說祭醮之法中卷說玉女隱形之術下卷說飛身藏形劒少女還精遁甲六壬之仙女曰子無仙分但備修此法三年後可為地下頑仙矣人壽一千二百歲為頑仙此文是上天祕訣莫非君子宿有道不可知也法曰如欲修隱形之法須仁慈救物如修劔法并俠仙法則為人正直去財色為人猛烈獨行愛正常行慈悲修一年便有功也如修少女還精之法即須為人平等孝順心慈勿行欺矯當行一年事乃成矣得壽千歲亦可為頑仙張群修之傳與鬼谷子修之不三年千變萬化莫之聖也後世人修法莫不心有道緣中人以上方可得聞也若人遇此祕法術為人劣凡解隱形巳是劒俠一半也凡須俠成須戒為人忠孝有恩有義不可欺負人斬邪歸正先須知隱形之後於一室之內安牀焚香潔淨不得有別人往來起卧先於牀前鋪枕齊戒焚香淨水存思解穢供飬六丁玉女祭醮祭遇丁日夜於床上坐定閉目存想牀為印案一面西為頭身帶六丁玉女印其印是九天玄女管係玉女之印也存印法先存東北印丁卯玉女立於印角手執青蛇之劔次丁巳玉女在東南角手執或黃或白蛇之劔次存西南印丁未玉女立在印角手執或白或黃之劒次存西北印丁丑玉女立在印角手執或黑或黃之劔次存丁酉丁亥玉女立在左右手執或青或黃蛇之劔存想畢低聲念呪一百八十遍訖却身邊丁酉丁亥玉女從鼻中直入心中鼻為人門次存東北角丁卯玉女從左耳中直入東南角先次丁卬次西南角丁未次西北角丁丑次丁酉丁亥在身邊亦在印上直入心內左耳為風門次存印東南角丁巳玉女右耳直入心內右耳為鬼門次存印西南角丁未玉女從口中直入心內口為地戶次存印西北角丁丑玉女從兩目直入心內目為天門各存思訖凡行住坐卧須常帶印在左手上不得離身或大小二事解下印安在淨處回來洗手却帶印了如夜夢上山入水相煞斬人或見女子在邊傍切勿驚怖此是玉女降身也九天玄女印式用龍驚棗木安於水盆內其木自浮動者為真遇甲子日焚香自己剋之勿令人見切冝愼之印式于左丁卯玉女符右玉女名文伯字仁髙左手摩孩子頭其孩子不著衣丁丑玉女符玉女名文公字仁貴右手二指拳三指展丁亥玉女符右玉女名文通字仁和左手把兩指拳三指展丁未玉女符右玉女名叔通字仁富左手把鏡右手把蓮花丁已玉女符右玉女名庭𡖖字仁叔右手把扇如禪印丁酉玉女符右玉女名文𡖖字仁修直身番著乎乘服彩霞修真得尸解法可於世無礙不爾未可棄道乎兼要務此法但霧化身爾乘服彩霞歸太極胎息隂經曰內息無名唯行相成若不遵戒行入胎息未得合真太微隱書曰凡胎息遊於人間行尸解隨所化者當庚辰日取辰時於淨室內焚香一爐於床頭邊設几案上著香爐杜杖鞋履蓋物並置於床頭邊身衣下解以衣覆蓋其面了向西而卧自存念作死人隂念呪七遍呪曰天上玄靈受自生靈七思七召三魂隨迎代豫之形形隨物化應化而成急急如律令呪畢但依常睡又存思一食久切不可與人通語話則法不成志心依法修四十九日斷漸法成或時要用行住坐卧默念此呪隨手提物便急回身別人而去衆人只見某所提之物是某身巳死矣後却見物歸本形此隱法可以下界助道尸解易形逃難不可輒便行非法之事凡欲修身切須靜默隱不得漏泄若卧在床但以被覆蓋其身默念呪七遍便起出門人只見所卧上衣裳自己身不被形若以欺取財色神明消折大道不許千萬記之勿得亂傳冝敬之祕之後序黃帝曰六丁玉女神能長能短能有能無䖍心占而問之萬事從心亦占千里身萬里消息若要物任意所為並皆立至矣此法遇者令人宅清吉五毒災難不近求仙得仙求官得官子孫興旺不衰微細並皆得之若要使時雨下人間當直欲要知凶吉占而問之必有神驗矣丁丑玉女神事如君王法愼勿口傳勿惡語罵詈辱之但祭而䖍之先知未來之事意察萬里之驗委曲書信之意旨也或有急難口舌之事皆召而問之可知之矣夫學道者不遇此法無以得成矣古者各將達士不廢者皆得此文祭而祀之並得仙也此法貴重萬金不傳父于不相視真祕文之妙訣耳靈寶六丁祕法
