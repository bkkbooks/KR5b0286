front:
  text: 靈寶六丁祕法五三黃帝曰一氣既分隂陽得位五行配定六甲生焉是以一甲十神共六丁者乃六甲旬直神已與天地各生自數戰蚩尤不勝乃紊亂綱紀遂齊潔䖍行敬仰告上玄感降九天玄女受此真訣令却去凶害濟物利人黃帝修之有功戰蚩尤即以素白篆符藏諸名山後世人數數有之此法即有神功不具說若人輕傳慢易冒觸真靈兩具受殃此道法門度世竒訣古者名將皆受此訣是以逆知勝負預曉吉凶明是非聖賢皆有神助若非英雄逹士宿有道緣莫過斯文枉淹歲月黃帝曰六甲六丁神女名字先以淨水滌淨穢氣然後乃得啓卷禱祝看之若有觸犯即殃及九祖長役三官亦且殘首毁形不得妄有漏泄於非道人從吾所戒萬願從心矣此事傅者如常如事嚴師愼口勿傳一不枉殺生命常行隂德慈心救物常愼行此口勿雜言但祭而使之預知未來之意察萬萬里之驗委曲之旨舉止一一並知若有事占而問之立知之矣登明河魁從魁春三月丁卯日攝之太乙天罡太衝秋三月丁亥日攝之傳送小吉勝光夏三月丁酉日攝之功曹大吉神后冬三月丁丑日攝之
  hash: sha256:2b2f806160ed001ebc843ff865ecd024e6b4b97b5feabcd67f6fa9249c2e0b42
